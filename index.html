<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Pro AR Developer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background: #020617; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { backdrop-filter: blur(16px); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .font-arabic { 
            font-family: 'Amiri', serif; 
            line-height: 2.8; /* Ditambah dari 2.2 agar harakat tidak nempel */
            direction: rtl;
        }
    </style>
</head>
<body class="text-white min-h-screen pb-24 relative overflow-x-hidden">

    <section id="tab-home" class="tab-content active p-6 max-w-md mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-xl font-extrabold tracking-widest text-emerald-400 mb-1 uppercase">MUSLIM PRO</h1>
            <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em]">BY AR Developer</p>
        </header>

        <div class="glass p-8 rounded-[2.5rem] text-center shadow-2xl mb-6 relative overflow-hidden">
            <div id="hijri-box" class="mb-4 inline-block px-4 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                <p id="tgl-hijri" class="text-[11px] font-bold text-emerald-400 tracking-wider uppercase">Memuat Kalender...</p>
            </div>
            
            <p id="label-berikutnya" class="text-slate-400 uppercase tracking-[0.3em] text-[9px] font-bold mb-2">Selanjutnya</p>
            <h2 id="nama-sholat" class="text-3xl font-extrabold mb-1">-</h2>
            <div id="hitung-mundur" class="text-5xl font-mono font-black tracking-tighter">00:00:00</div>
            <p id="tgl-masehi" class="text-slate-400 text-[10px] mt-4 font-bold uppercase tracking-widest">-</p>
            <p id="info-lokasi" class="text-slate-500 text-[8px] mt-1 font-bold uppercase tracking-widest opacity-60">Mendeteksi Lokasi...</p>
        </div>

        <div id="daftar-sholat" class="space-y-3"></div>

        <div class="glass p-6 rounded-[2rem] mt-6 text-center shadow-lg border border-white/10">
            <p id="quote-text" class="text-slate-200 italic text-sm leading-relaxed mb-3">"Memuat motivasi..."</p>
            <div class="h-[1px] w-12 bg-emerald-500/30 mx-auto mb-3"></div>
            <p id="hadits-text" class="text-emerald-400 text-[10px] font-extrabold uppercase tracking-[0.2em]"></p>
        </div>
    </section>

    <section id="tab-quran" class="tab-content p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-4 text-emerald-400">Al-Qur'an</h2>
        <input type="text" id="search-surah" placeholder="Cari nama surat..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 mb-6 text-sm focus:outline-none focus:border-emerald-500 text-white">
        <div id="list-surah" class="space-y-3"></div>
    </section>

    <section id="tab-doa" class="tab-content p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-emerald-400">Doa Harian</h2>
        <div id="list-doa" class="space-y-4"></div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 glass backdrop-blur-xl border-t border-white/5 flex justify-around p-4 z-50 rounded-t-[2rem]">
        <button onclick="switchTab('home', this)" class="nav-btn text-emerald-500 flex flex-col items-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Jadwal</span>
        </button>
        <button onclick="switchTab('quran', this)" class="nav-btn text-slate-500 flex flex-col items-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Quran</span>
        </button>
        <button onclick="switchTab('doa', this)" class="nav-btn text-slate-500 flex flex-col items-center">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="text-[9px] font-bold mt-1 uppercase">Doa</span>
        </button>
    </nav>

    <div id="modal-quran" class="fixed inset-0 z-[100] bg-[#020617] flex flex-col p-6 hidden">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modal-title" class="text-xl font-bold text-emerald-400"></h3>
            <button onclick="tutupModal()" class="p-2 bg-white/10 rounded-full">✕</button>
        </div>
        <div id="isi-ayat" class="overflow-y-auto space-y-6 pb-10"></div>
    </div>

    <script>
        const prayList = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        const prayIndo = { "Fajr": "Subuh", "Dhuhr": "Dzuhur", "Asr": "Ashar", "Maghrib": "Maghrib", "Isha": "Isya" };
        const quotes = [
    { q: "Sesungguhnya sesudah kesulitan itu ada kemudahan.", h: "QS. AL-INSYIRAH: 6" },
    { q: "Senyummu di depan saudaramu adalah sedekah.", h: "HR. TIRMIDZI" },
    { q: "Sebaik-baik manusia adalah yang paling bermanfaat bagi orang lain.", h: "HR. AHMAD" },
    { q: "Barangsiapa yang menempuh jalan untuk mencari ilmu, Allah mudahkan jalannya ke surga.", h: "HR. MUSLIM" },
    { q: "Tangan di atas lebih baik daripada tangan di bawah.", h: "HR. BUKHARI & MUSLIM" },
    { q: "Kekayaan yang hakiki bukanlah banyaknya harta, melainkan kekayaan jiwa.", h: "HR. BUKHARI & MUSLIM" },
    { q: "Siapa yang melepaskan satu kesusahan orang mukmin, Allah akan melepaskan satu kesusahannya di hari kiamat.", h: "HR. MUSLIM" },
    { q: "Beribadahlah kepada Allah seakan-akan kamu melihat-Nya.", h: "HR. MUSLIM" },
    { q: "Seorang muslim adalah saudara bagi muslim lainnya, tidak boleh menzaliminya.", h: "HR. MUSLIM" },
    { q: "Barangsiapa yang beriman kepada Allah dan hari akhir, hendaklah ia berkata baik atau diam.", h: "HR. BUKHARI" },
    { q: "Shalat adalah tiang agama.", h: "HR. BAIHAQI" },
    { q: "Surga itu di bawah telapak kaki ibu.", h: "HR. AHMAD" },
    { q: "Barangsiapa yang membantu kebutuhan saudaranya, maka Allah akan membantu kebutuhannya.", h: "HR. BUKHARI" },
    { q: "Kemudahan itu berasal dari Allah, sedangkan kesulitan itu berasal dari dirimu sendiri.", h: "KUTIPAN ISLAMI" },
    { q: "Janganlah kamu berputus asa dari rahmat Allah.", h: "QS. AZ-ZUMAR: 53" }
];
        let allSurah = [], quranCache = {};

        function switchTab(target, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-emerald-500', 'text-slate-500'));
            document.getElementById(`tab-${target}`).classList.add('active');
            btn.classList.replace('text-slate-500', 'text-emerald-500');
            if(target === 'quran') loadQuran();
            if(target === 'doa') loadDoa();
        }

        async function fetchJadwalGlobal(lat, lon) {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                const data = await res.json();
                const d = data.data;
                
                // UPDATE HIJRIYAH
                const h = d.date.hijri;
                document.getElementById('tgl-hijri').innerText = `${h.day} ${h.month.en} ${h.year} H`;

                // TAMBAHKAN BARIS INI UNTUK MASEHI
                document.getElementById('tgl-masehi').innerText = d.date.readable;
                
                document.getElementById('info-lokasi').innerText = "LOKASI AKTIF";
                renderJadwal(d.timings);
                startCountdown(d.timings);
            } catch (err) { document.getElementById('info-lokasi').innerText = "Gagal memuat data."; }
        }

        function renderJadwal(timings) {
            document.getElementById('daftar-sholat').innerHTML = prayList.map(key => `
                <div class="flex justify-between items-center glass p-4 rounded-2xl">
                    <span class="font-semibold text-slate-300">${prayIndo[key]}</span>
                    <span class="text-xl font-bold text-white">${timings[key]}</span>
                </div>`).join('');
        }

        function startCountdown(timings) {
            setInterval(() => {
                const now = new Date();
                let target = null, label = "";
                for (let key of prayList) {
                    const [h, m] = timings[key].split(':');
                    const tDate = new Date(); tDate.setHours(h, m, 0);
                    if (tDate > now) { target = tDate; label = prayIndo[key]; break; }
                }
                if (!target) { 
                    const [h, m] = timings['Fajr'].split(':'); 
                    target = new Date(); target.setDate(target.getDate()+1); target.setHours(h,m,0); label="Subuh"; 
                }
                const diff = target - now;
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('nama-sholat').innerText = label;
                document.getElementById('hitung-mundur').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadQuran() {
            if (allSurah.length > 0) return;
            const container = document.getElementById('list-surah');
            container.innerHTML = "<p class='text-center animate-pulse text-emerald-400'>Memuat Al-Quran...</p>";
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const data = await res.json();
                allSurah = data.data;
                renderQuranList(allSurah);
                document.getElementById('search-surah').oninput = (e) => {
                    renderQuranList(allSurah.filter(s => s.namaLatin.toLowerCase().includes(e.target.value.toLowerCase())));
                };
            } catch (err) { container.innerHTML = "Gagal memuat."; }
        }

        function renderQuranList(data) {
            document.getElementById('list-surah').innerHTML = data.map(s => {
                const namaBersih = s.namaLatin.replace(/'/g, "\\'"); 
                return `<div onclick="bukaAyat(${s.nomor}, '${namaBersih}')" class="glass p-5 rounded-2xl flex justify-between items-center cursor-pointer active:scale-95 transition-all"><div class="flex flex-col"><span class="text-[10px] text-emerald-500 font-bold">${s.nomor}. ${s.tempatTurun}</span><span class="font-bold text-slate-200">${s.namaLatin}</span></div><span class="text-2xl font-arabic text-emerald-400">${s.nama}</span></div>`;
            }).join('');
        }

        async function bukaAyat(nomor, nama) {
            document.getElementById('modal-quran').classList.remove('hidden');
            document.getElementById('modal-title').innerText = nama;
            const isi = document.getElementById('isi-ayat');
            if (quranCache[nomor]) { renderAyat(quranCache[nomor]); return; }
            isi.innerHTML = "<p class='text-center animate-pulse text-emerald-400 mt-10'>Mengunduh Ayat...</p>";
            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const data = await res.json();
                quranCache[nomor] = data.data.ayat;
                renderAyat(data.data.ayat);
            } catch (err) { isi.innerHTML = "Gagal memuat."; }
        }

        function renderAyat(ayat) {
            document.getElementById('isi-ayat').innerHTML = ayat.map(a => `
                <div class="border-b border-white/5 pb-10 mb-4 text-right">
            <!-- Menambahkan padding bawah (pb-10) agar ada jarak ke terjemahan -->
            <p class="text-3xl font-arabic mb-6 text-white leading-[2.8]">${a.teksArab}</p>
            <p class="text-slate-400 text-sm text-left italic leading-relaxed">
                <span class="text-emerald-500 font-bold mr-2">${a.nomorAyat}.</span>${a.teksIndonesia}
            </p>
        </div>`).join('');
            document.getElementById('isi-ayat').scrollTop = 0;
        }

        function tutupModal() { document.getElementById('modal-quran').classList.add('hidden'); }

        function loadDoa() {
    const container = document.getElementById('list-doa');
    // Mencegah duplikasi jika data sudah ada
    if (container.innerHTML !== "" && !container.innerHTML.includes('Memuat')) return;

    // Database Doa Lengkap (Harian, Rezeki, & Kerja)
    const doas = [
        { 
            t: "Doa Kelancaran Rezeki", 
            a: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلًا مُتَقَبَّلًا", 
            i: "Ya Allah, sungguh aku memohon kepada-Mu ilmu yang bermanfaat, rezeki yang baik, dan amal yang diterima." 
        },
        { 
            t: "Doa Keselamatan & Perlindungan Kerja", 
            a: "بِسْمِ اللهِ عَلَى نَفْسِي وَمَالِي وَدِينِي، اللَّهُمَّ رَضِّنِي بِقَضَائِكَ وَبَارِكْ لِي فِيمَا قُدِّرَ لِي", 
            i: "Dengan nama Allah atas diriku, hartaku, dan agamaku. Ya Allah, jadikanlah aku rida atas ketetapan-Mu dan berilah berkah pada apa yang telah Engkau takdirkan untukku." 
        },
        { 
            t: "Doa Keluar Rumah", 
            a: "بِسْمِ اللَّهِ تَوَكَّلْتُ عَلَى اللَّهِ لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ", 
            i: "Dengan nama Allah, aku bertawakal kepada Allah. Tiada daya dan kekuatan kecuali dengan Allah." 
        },
        { 
            t: "Doa Naik Kendaraan", 
            a: "سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ", 
            i: "Maha Suci Allah yang telah menundukkan semua ini bagi kami padahal kami sebelumnya tidak mampu menguasainya, dan sesungguhnya kami akan kembali kepada Tuhan kami." 
        },
        { 
            t: "Doa Untuk Kedua Orang Tua", 
            a: "رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا", 
            i: "Wahai Tuhanku, ampunilah aku dan kedua orang tuaku dan sayangilah mereka sebagaimana mereka menyayangiku di waktu kecil." 
        },
        { 
            t: "Doa Sebelum Makan", 
            a: "اللَّهُمَّ بَارِكْ لَنَا فِيمَا رَزَقْتَنَا وَقِنَا عَذَابَ النَّارِ", 
            i: "Ya Allah, berkahilah kami atas rezeki yang telah Engkau berikan kepada kami dan jagalah kami dari siksa api neraka." 
        },
        { 
            t: "Doa Bangun Tidur", 
            a: "الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ", 
            i: "Segala puji bagi Allah yang telah menghidupkan kami setelah mematikan kami dan kepada-Nya lah kami kembali." 
        },
        { 
            t: "Doa Masuk Masjid", 
            a: "اللَّهُمَّ افْتَحْ لِي أَبْوَابَ رَحْمَتِكَ", 
            i: "Ya Allah, bukakanlah bagiku pintu-pintu rahmat-Mu." 
        },
        { 
            t: "Doa Sebelum Tidur", 
            a: "بِاسْمِكَ اللَّهُمَّ أَحْيَا وَأَمُوتُ", 
            i: "Dengan nama-Mu ya Allah, aku hidup dan aku mati." 
        },
        { 
            t: "Doa Masuk Kamar Mandi", 
            a: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبُثِ وَالْخَبَائِثِ", 
            i: "Ya Allah, sesungguhnya aku berlindung kepada-Mu dari setan laki-laki dan setan perempuan." 
        },
        { 
            t: "Doa Keluar Kamar Mandi", 
            a: "غُفْرَانَكَ", 
            i: "Aku memohon ampunan-Mu." 
        }
    ];

    container.innerHTML = "";
    doas.forEach(d => {
        container.innerHTML += `
            <div class="glass p-5 rounded-2xl border border-white/5 hover:border-emerald-500/30 transition-all duration-300">
                <p class="text-emerald-500 font-bold text-[10px] mb-3 uppercase tracking-[0.2em]">${d.t}</p>
                <p class="text-right text-2xl leading-loose font-serif text-white mb-3" dir="rtl">${d.a}</p>
                <p class="text-slate-400 text-[11px] italic leading-relaxed border-t border-white/5 pt-3">${d.i}</p>
            </div>
        `;
    });
}

        function init() {
            const r = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quote-text').innerText = `"${r.q}"`;
            document.getElementById('hadits-text').innerText = r.h;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => fetchJadwalGlobal(p.coords.latitude, p.coords.longitude), () => fetchJadwalGlobal(-7.42, 110.93));
            } else { fetchJadwalGlobal(-7.42, 110.93); }
        }
        init();
    </script>
</body>
</html>
